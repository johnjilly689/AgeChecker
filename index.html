<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Checker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="page-shell">
        <section class="checker-card" aria-labelledby="pageTitle">
            <div class="card-header">
                <span class="badge">Age Check</span>
                <h1 id="pageTitle">Find Your Age Group</h1>
                <p>Enter your age and get an instant response from the backend.</p>
            </div>

            <div class="input-group">
                <label for="ageInput">Your age</label>
                <div class="control-row">
                    <input type="number" id="ageInput" min="0" placeholder="Enter age">
                    <button id="checkAgeButton" type="button">Check</button>
                </div>
            </div>

            <p id="result" class="result-box" aria-live="polite">Result will appear here.</p>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="script.js"></script>

</body>
</html>
